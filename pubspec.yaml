name: yegamssi
description: "예감씨 - 날씨·활동점수·운세 기반 행동 판단 앱"
publish_to: "none"
version: 1.1.13+45

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0

  # Backend
  supabase_flutter: ^2.8.0

  # Storage
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.2

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Android Widget
  home_widget: ^0.7.0

  # Environment
  flutter_dotenv: ^5.2.1

  # i18n
  intl: ^0.20.2

  # Data classes
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Utilities
  equatable: ^2.0.7
  logger: ^2.5.0
  connectivity_plus: ^6.1.3
  permission_handler: ^11.4.0
  google_mobile_ads: ^5.1.0

  url_launcher: ^6.3.1
  package_info_plus: ^8.0.2
  in_app_update: ^4.2.2
  qr_flutter: ^4.1.0

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3

  # Test
  mockito: ^5.4.4
  mocktail: ^1.0.4
  image: ^4.8.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/icons/weather/
    - assets/icons/fortune/
    - assets/icons/activity/
    - assets/images/
    - .env
